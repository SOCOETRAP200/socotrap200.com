<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCOTRAP Wallet</title>
    <link rel="stylesheet" href="wallet.css">
    <script defer src="wallet.js"></script>
</head>
<body>

    <header>
        <h1>SOCOTRAP Wallet</h1>
        <div class="balance">
            <h2>Solde Total</h2>
            <p id="totalBalance">$0.00</p>
        </div>
    </header>

    <section class="actions">
        <button onclick="showSend()">Envoyer</button>
        <button onclick="showReceive()">Recevoir</button>
        <button onclick="showBuy()">Acheter</button>
        <button onclick="showSwap()">Swap</button>
    </section>

    <section class="tokens">
        <h2>Tokens</h2>

        <div class="token" onclick="openToken('BTC')">
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" alt="BTC">
            <div>
                <h3>Bitcoin</h3>
                <p id="btcPrice">$0.00</p>
            </div>
            <span class="positive">+0.00%</span>
        </div>

        <div class="token" onclick="openToken('ETH')">
            <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" alt="ETH">
            <div>
                <h3>Ethereum</h3>
                <p id="ethPrice">$0.00</p>
            </div>
            <span class="negative">-0.00%</span>
        </div>

        <div class="token" onclick="openToken('BNB')">
            <img src="https://cryptologos.cc/logos/bnb-bnb-logo.png" alt="BNB">
            <div>
                <h3>BNB</h3>
                <p id="bnbPrice">$0.00</p>
            </div>
            <span class="positive">+0.00%</span>
        </div>

        <div class="token" onclick="openToken('PI')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Pi_Network.svg/512px-Pi_Network.svg.png" alt="PI">
            <div>
                <h3>Pi Network</h3>
                <p id="piPrice">$0.00</p>
            </div>
            <span class="positive">+0.00%</span>
        </div>
    </section>

    <section id="market">
        <h2>Marché Crypto</h2>
        <div id="marketData"></div>
    </section>

    <section id="nfts">
        <h2>NFTs</h2>
        <div class="nft-card">
            <img src="https://via.placeholder.com/150" alt="NFT">
            <p>Mon NFT</p>
        </div>
    </section>

    <section id="sendSection" style="display:none;">
        <h2>Envoyer</h2>
        <input type="text" placeholder="Adresse du destinataire">
        <input type="number" placeholder="Montant">
        <button>Confirmer</button>
        <button onclick="closeForms()">Annuler</button>
    </section>

    <section id="receiveSection" style="display:none;">
        <h2>Recevoir</h2>
        <p>Adresse :</p>
        <input type="text" value="0x123456789abcdef" readonly>
        <button>Copier</button>
    </section>

    <section id="swapSection" style="display:none;">
        <h2>Swap</h2>

        <select>
            <option>BTC</option>
            <option>ETH</option>
            <option>BNB</option>
            <option>PI</option>
        </select>

        <select>
            <option>ETH</option>
            <option>BTC</option>
            <option>BNB</option>
            <option>PI</option>
        </select>

        <button>Échanger</button>
    </section>

    <section id="buySection" style="display:none;">
        <h2>Acheter</h2>

        <button>Payer par Carte</button>
        <button>Payer en Crypto</button>
    </section>

    <nav class="bottom-nav">
        <button>Accueil</button>
        <button>Marché</button>
        <button>Swap</button>
        <button>NFTs</button>
        <button>Paramètres</button>
    </nav>

</body>
</html>
