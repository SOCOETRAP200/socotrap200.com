<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOCOETRAP Wallet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Header -->
    <header>
        <div class="wallet-name">
            <h2>SOCOETRAP Wallet</h2>
            <span>Multi-Crypto Wallet</span>
        </div>

        <div class="notif">
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <!-- Solde -->
    <section class="balance-card">
        <p>Valeur Totale</p>
        <h1>$12,458.67</h1>
        <span class="profit">+4.85%</span>
    </section>

    <!-- Actions -->
    <section class="actions">

        <button>
            <i class="fas fa-paper-plane"></i>
            <span>Envoyer</span>
        </button>

        <button>
            <i class="fas fa-download"></i>
            <span>Recevoir</span>
        </button>

        <button>
            <i class="fas fa-right-left"></i>
            <span>Swap</span>
        </button>

        <button>
            <i class="fas fa-credit-card"></i>
            <span>Acheter</span>
        </button>

    </section>

    <!-- Crypto -->
    <section class="assets">

        <h3>Mes actifs</h3>

        <div class="coin">

            <div class="left">
                <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" width="40">
                <div>
                    <h4>Bitcoin</h4>
                    <p>BTC</p>
                </div>
            </div>

            <div class="right">
                <h4>$108,500</h4>
                <span class="green">+2.5%</span>
            </div>

        </div>

        <div class="coin">

            <div class="left">
                <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" width="40">
                <div>
                    <h4>Ethereum</h4>
                    <p>ETH</p>
                </div>
            </div>

            <div class="right">
                <h4>$5,300</h4>
                <span class="green">+1.7%</span>
            </div>

        </div>

        <div class="coin">

            <div class="left">
                <img src="https://cryptologos.cc/logos/bnb-bnb-logo.png" width="40">
                <div>
                    <h4>BNB</h4>
                    <p>BNB</p>
                </div>
            </div>

            <div class="right">
                <h4>$950</h4>
                <span class="green">+0.8%</span>
            </div>

        </div>

        <div class="coin">

            <div class="left">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="40">
                <div>
                    <h4>Tether</h4>
                    <p>USDT</p>
                </div>
            </div>

            <div class="right">
                <h4>$1.00</h4>
                <span class="green">+0.01%</span>
            </div>

        </div>

        <div class="coin">

            <div class="left">
                <img src="https://minepi.com/favicon.ico" width="40">
                <div>
                    <h4>Pi Network</h4>
                    <p>PI</p>
                </div>
            </div>

            <div class="right">
                <h4>$0.00</h4>
                <span class="red">-0.5%</span>
            </div>

        </div>

    </section>

    <!-- Graphique -->
    <section class="chart">

        <h3>Performance du marché</h3>

        <canvas id="marketChart"></canvas>

    </section>

    <!-- Navigation -->
    <nav>

        <a class="active">
            <i class="fas fa-wallet"></i>
            <span>Accueil</span>
        </a>

        <a>
            <i class="fas fa-chart-line"></i>
            <span>Marché</span>
        </a>

        <a>
            <i class="fas fa-right-left"></i>
            <span>Swap</span>
        </a>

        <a>
            <i class="fas fa-clock-rotate-left"></i>
            <span>Historique</span>
        </a>

        <a>
            <i class="fas fa-gear"></i>
            <span>Paramètres</span>
        </a>

    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
